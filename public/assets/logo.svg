<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">

      <!-- Radiador minimalista -->
      <rect x="150" y="40" width="300" height="20" rx="6" fill="#6B7280" />
      <rect x="170" y="60" width="260" height="10" rx="4" fill="#9CA3AF" />
      <rect x="150" y="70" width="300" height="10" rx="6" fill="#6B7280" />

      <!-- RDB -->
      <text x="140" y="210"
            font-family="Montserrat, Arial"
            font-size="140"
            font-weight="700"
            fill="#2563EB">
            RDB
      </text>

      <!-- Gauge dentro de la D -->
      <path d="M340 170 A40 40 0 0 1 420 170"
            stroke="#1E3A8A"
            stroke-width="6"
            fill="none" />

      <line x1="380" y1="170" x2="405" y2="150"
            stroke="#EF4444"
            stroke-width="6" />

      <circle cx="380" cy="170" r="6" fill="#EF4444" />

      <!-- Texto inferior -->
      <text x="160" y="300"
            font-family="Montserrat, Arial"
            font-size="44"
            font-weight="700"
            fill="#1E3A8A">
            RADIADORES
      </text>

      <text x="200" y="340"
            font-family="Montserrat, Arial"
            font-size="30"
            fill="#374151">
            DON BOSCO
      </text>

</svg>